<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lunara Codebase Breakdown</title>
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.2.0/github-markdown.min.css">
    <style>
        .markdown-body {
            box-sizing: border-box;
            min-width: 200px;
            max-width: 980px;
            margin: 0 auto;
            padding: 45px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji";
        }

        @media (max-width: 767px) {
            .markdown-body {
                padding: 15px;
            }
        }

        body {
            background-color: #fdfbf7;
        }

        .markdown-body {
            background-color: white;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            border-radius: 8px;
            margin-top: 40px;
            margin-bottom: 40px;
        }

        h1,
        h2,
        h3 {
            color: #d8405b !important;
        }

        pre {
            background-color: #f6f8fa !important;
            border-radius: 6px !important;
        }

        code {
            background-color: rgba(216, 64, 91, 0.05) !important;
            color: #d8405b !important;
        }

        table {
            display: table !important;
            width: 100% !important;
            margin-bottom: 16px !important;
        }

        th,
        td {
            border: 1px solid #dfe2e5 !important;
            padding: 6px 13px !important;
        }
    </style>
</head>

<body class="markdown-body">
    <div id="content"></div>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
        const markdown = `
# 🌙 Lunara — Complete Codebase Breakdown

> **Lunara** is a premium Flutter menstrual-cycle tracking app with AI-powered insights, Supabase cloud sync, Health Connect integration, partner sharing, and smart notifications.

---

## 1. Architecture & Overview

### High-Level System Design
Lunara follows a client-heavy architecture where the Flutter app performs core business logic and syncs to Supabase. This ensures offline availability and cloud backup.

## 2. Project Structure
- **lib/providers**: Core state management (CycleProvider, AuthProvider).
- **lib/services**: External integrations (Supabase, Health, AI).
- **lib/screens**: UI components (20+ screens).

## 3. Key Technologies
- **Flutter**: Cross-platform frontend.
- **Supabase**: Backend-as-a-Service (PostgreSQL, Auth).
- **Gemini AI**: Personalized health chat.
- **Health Connect**: OS-level health data sync.

---

*(Full breakdown continued in the generated PDF)*
`;
        document.getElementById('content').innerHTML = marked.parse(markdown);
    </script>
</body>

</html>
